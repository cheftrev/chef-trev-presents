# Netlify configuration for Chef Trev Presents (static SPA)
[build]
  command = "npx vite build"
  publish = "dist/public"

# Single-page-app fallback so /about, /menu, etc. resolve to the app.
# (Netlify processes form POSTs before this, so the contact form still works.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
